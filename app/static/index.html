<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RAG Platform</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1115; color: #e6e6e6; height: 100vh; display: flex; flex-direction: column;
  }
  header {
    padding: 0.75rem 1.25rem; border-bottom: 1px solid #24262e; display: flex;
    align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 1rem; margin: 0; font-weight: 600; }
  #userBox { font-size: 0.85rem; color: #9aa0ac; display: flex; gap: 0.75rem; align-items: center; }
  button { cursor: pointer; border: none; border-radius: 6px; padding: 0.45rem 0.9rem; font-size: 0.85rem; }
  button.primary { background: #4f7cff; color: white; }
  button.ghost { background: transparent; color: #9aa0ac; border: 1px solid #2c2f38; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  input, textarea { background: #1a1c22; border: 1px solid #2c2f38; color: #e6e6e6; border-radius: 6px; padding: 0.5rem 0.7rem; font-size: 0.9rem; }
  #authScreen { display: flex; flex: 1; align-items: center; justify-content: center; }
  .card { background: #171920; border: 1px solid #24262e; border-radius: 10px; padding: 1.5rem; width: 320px; }
  .card h2 { margin-top: 0; font-size: 1.1rem; }
  .card form { display: flex; flex-direction: column; gap: 0.6rem; }
  .card .switch { margin-top: 0.8rem; font-size: 0.8rem; color: #9aa0ac; text-align: center; cursor: pointer; }
  .error { color: #ff6b6b; font-size: 0.8rem; min-height: 1em; }
  #app { display: none; flex: 1; overflow: hidden; }
  #layout { display: flex; flex: 1; height: 100%; }
  aside {
    width: 340px; border-right: 1px solid #24262e; display: flex; flex-direction: column; overflow: hidden;
  }
  .panel { padding: 1rem; overflow-y: auto; flex: 1; }
  .panel h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #9aa0ac; margin: 1rem 0 0.5rem; }
  .panel h3:first-child { margin-top: 0; }
  #docUpload { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
  #docUpload input[type=file] { flex: 1; font-size: 0.75rem; }
  .doc-item, .session-item {
    padding: 0.5rem 0.6rem; border-radius: 6px; font-size: 0.82rem; margin-bottom: 0.3rem;
    display: flex; justify-content: space-between; align-items: center; gap: 0.5rem;
  }
  .doc-item { background: #1a1c22; }
  .session-item { background: #1a1c22; cursor: pointer; }
  .session-item.active { background: #2a3040; outline: 1px solid #4f7cff; }
  .doc-status { font-size: 0.68rem; padding: 0.1rem 0.4rem; border-radius: 4px; white-space: nowrap; }
  .status-ready { background: #1d3a2a; color: #6fdc8c; }
  .status-processing { background: #3a331d; color: #dcc16f; }
  .status-failed { background: #3a1d1d; color: #dc6f6f; }
  .doc-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .icon-btn { background: none; border: none; color: #6a6f7a; font-size: 0.9rem; padding: 0 0.2rem; }
  .icon-btn:hover { color: #ff6b6b; }
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
  .msg { max-width: 70%; padding: 0.7rem 0.9rem; border-radius: 10px; font-size: 0.9rem; line-height: 1.4; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: #4f7cff; color: white; }
  .msg.assistant { align-self: flex-start; background: #1a1c22; border: 1px solid #24262e; }
  .msg .sources { margin-top: 0.5rem; font-size: 0.72rem; color: #9aa0ac; border-top: 1px solid #2c2f38; padding-top: 0.4rem; }
  #composer { display: flex; gap: 0.6rem; padding: 1rem 1.5rem; border-top: 1px solid #24262e; }
  #composer textarea { flex: 1; resize: none; height: 44px; }
  #emptyState { flex: 1; display: flex; align-items: center; justify-content: center; color: #6a6f7a; font-size: 0.9rem; }
  .hint { font-size: 0.75rem; color: #6a6f7a; }
</style>
</head>
<body>

<header>
  <h1>RAG Platform</h1>
  <div id="userBox"></div>
</header>

<div id="authScreen">
  <div class="card">
    <h2 id="authTitle">Log in</h2>
    <form id="authForm">
      <input id="fullNameField" type="text" placeholder="Full name (optional)" style="display:none" />
      <input id="emailField" type="email" placeholder="Email" required />
      <input id="passwordField" type="password" placeholder="Password (min 8 chars)" minlength="8" required />
      <button class="primary" type="submit" id="authSubmit">Log in</button>
      <div class="error" id="authError"></div>
    </form>
    <div class="switch" id="authSwitch">Need an account? Register</div>
  </div>
</div>

<div id="app">
  <div id="layout">
    <aside>
      <div class="panel">
        <h3>Documents</h3>
        <div id="docUpload">
          <input type="file" id="fileInput" />
          <button class="primary" id="uploadBtn">Upload</button>
        </div>
        <div class="hint" id="uploadHint"></div>
        <div id="docList"></div>

        <h3>
          Chats
          <button class="ghost" id="newChatBtn" style="float:right; padding:0.15rem 0.5rem;">+ New</button>
        </h3>
        <div id="sessionList"></div>
      </div>
    </aside>
    <main>
      <div id="emptyState">Select or start a chat to begin.</div>
      <div id="messages" style="display:none"></div>
      <div id="composer" style="display:none">
        <textarea id="messageInput" placeholder="Ask something about your documents..."></textarea>
        <button class="primary" id="sendBtn">Send</button>
      </div>
    </main>
  </div>
</div>

<script>
const API = "/api/v1";

const state = {
  accessToken: localStorage.getItem("access_token") || null,
  refreshToken: localStorage.getItem("refresh_token") || null,
  user: null,
  isRegisterMode: false,
  documents: [],
  sessions: [],
  activeSessionId: null,
};

function authHeaders(extra = {}) {
  return { ...extra, Authorization: `Bearer ${state.accessToken}` };
}

async function api(path, options = {}) {
  const res = await fetch(`${API}${path}`, options);
  if (res.status === 401) {
    logout();
    throw new Error("Session expired, please log in again.");
  }
  if (!res.ok) {
    let detail = res.statusText;
    try {
      const body = await res.json();
      detail = typeof body.detail === "string" ? body.detail : JSON.stringify(body.detail);
    } catch {}
    throw new Error(detail || "Request failed");
  }
  return res;
}

// --- Auth ---

const authForm = document.getElementById("authForm");
const authTitle = document.getElementById("authTitle");
const authSwitch = document.getElementById("authSwitch");
const authError = document.getElementById("authError");
const authSubmit = document.getElementById("authSubmit");
const fullNameField = document.getElementById("fullNameField");

authSwitch.addEventListener("click", () => {
  state.isRegisterMode = !state.isRegisterMode;
  authTitle.textContent = state.isRegisterMode ? "Create account" : "Log in";
  authSubmit.textContent = state.isRegisterMode ? "Register" : "Log in";
  authSwitch.textContent = state.isRegisterMode ? "Have an account? Log in" : "Need an account? Register";
  fullNameField.style.display = state.isRegisterMode ? "block" : "none";
  authError.textContent = "";
});

authForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  authError.textContent = "";
  const email = document.getElementById("emailField").value.trim();
  const password = document.getElementById("passwordField").value;
  const fullName = fullNameField.value.trim();

  try {
    if (state.isRegisterMode) {
      await api("/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password, full_name: fullName || null }),
      });
    }
    const loginRes = await api("/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password }),
    });
    const tokens = await loginRes.json();
    state.accessToken = tokens.access_token;
    state.refreshToken = tokens.refresh_token;
    localStorage.setItem("access_token", tokens.access_token);
    localStorage.setItem("refresh_token", tokens.refresh_token);
    state.user = { email };
    enterApp();
  } catch (err) {
    authError.textContent = err.message;
  }
});

function logout() {
  state.accessToken = null;
  state.refreshToken = null;
  state.user = null;
  localStorage.removeItem("access_token");
  localStorage.removeItem("refresh_token");
  document.getElementById("app").style.display = "none";
  document.getElementById("authScreen").style.display = "flex";
}

function enterApp() {
  document.getElementById("authScreen").style.display = "none";
  document.getElementById("app").style.display = "flex";
  document.getElementById("userBox").innerHTML =
    `<span>${state.user?.email || ""}</span><button class="ghost" id="logoutBtn">Log out</button>`;
  document.getElementById("logoutBtn").addEventListener("click", logout);
  refreshDocuments();
  refreshSessions();
}

// --- Documents ---

const fileInput = document.getElementById("fileInput");
const uploadBtn = document.getElementById("uploadBtn");
const uploadHint = document.getElementById("uploadHint");
const docList = document.getElementById("docList");

uploadBtn.addEventListener("click", async () => {
  const file = fileInput.files[0];
  if (!file) return;
  uploadBtn.disabled = true;
  uploadHint.textContent = "Uploading...";
  try {
    const formData = new FormData();
    formData.append("file", file);
    await api("/documents", { method: "POST", headers: authHeaders(), body: formData });
    fileInput.value = "";
    uploadHint.textContent = "";
    await refreshDocuments();
  } catch (err) {
    uploadHint.textContent = err.message;
  } finally {
    uploadBtn.disabled = false;
  }
});

async function refreshDocuments() {
  try {
    const res = await api("/documents", { headers: authHeaders() });
    const data = await res.json();
    state.documents = data.items;
    renderDocuments();
  } catch (err) {
    console.error(err);
  }
}

function renderDocuments() {
  docList.innerHTML = "";
  for (const doc of state.documents) {
    const el = document.createElement("div");
    el.className = "doc-item";
    el.innerHTML = `
      <span class="doc-name" title="${doc.filename}">${doc.filename}</span>
      <span class="doc-status status-${doc.status}">${doc.status}</span>
      <button class="icon-btn" title="Delete">&times;</button>
    `;
    el.querySelector("button").addEventListener("click", async () => {
      await api(`/documents/${doc.id}`, { method: "DELETE", headers: authHeaders() });
      await refreshDocuments();
    });
    docList.appendChild(el);
  }
}

// --- Chat sessions ---

const sessionList = document.getElementById("sessionList");
const newChatBtn = document.getElementById("newChatBtn");
const emptyState = document.getElementById("emptyState");
const messagesEl = document.getElementById("messages");
const composerEl = document.getElementById("composer");
const messageInput = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");

newChatBtn.addEventListener("click", async () => {
  const res = await api("/chat/sessions", {
    method: "POST",
    headers: authHeaders({ "Content-Type": "application/json" }),
    body: JSON.stringify({ title: "New chat" }),
  });
  const session = await res.json();
  await refreshSessions();
  selectSession(session.id);
});

async function refreshSessions() {
  const res = await api("/chat/sessions", { headers: authHeaders() });
  state.sessions = await res.json();
  renderSessions();
}

function renderSessions() {
  sessionList.innerHTML = "";
  for (const s of state.sessions) {
    const el = document.createElement("div");
    el.className = "session-item" + (s.id === state.activeSessionId ? " active" : "");
    el.textContent = s.title;
    el.addEventListener("click", () => selectSession(s.id));
    sessionList.appendChild(el);
  }
}

async function selectSession(id) {
  state.activeSessionId = id;
  renderSessions();
  emptyState.style.display = "none";
  messagesEl.style.display = "flex";
  composerEl.style.display = "flex";
  await loadMessages(id);
}

async function loadMessages(sessionId) {
  messagesEl.innerHTML = "";
  const res = await api(`/chat/sessions/${sessionId}/messages`, { headers: authHeaders() });
  const msgs = await res.json();
  for (const m of msgs) appendMessage(m.role, m.content, m.sources);
  scrollToBottom();
}

function appendMessage(role, content, sources) {
  const el = document.createElement("div");
  el.className = `msg ${role}`;
  el.textContent = content;
  if (sources && sources.length) {
    const src = document.createElement("div");
    src.className = "sources";
    src.textContent = "Sources: " + sources.join(", ");
    el.appendChild(src);
  }
  messagesEl.appendChild(el);
  return el;
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage() {
  const content = messageInput.value.trim();
  if (!content || !state.activeSessionId) return;
  messageInput.value = "";
  sendBtn.disabled = true;
  appendMessage("user", content);
  scrollToBottom();
  const assistantEl = appendMessage("assistant", "");
  scrollToBottom();

  try {
    const res = await fetch(`${API}/chat/sessions/${state.activeSessionId}/messages`, {
      method: "POST",
      headers: authHeaders({ "Content-Type": "application/json" }),
      body: JSON.stringify({ content }),
    });
    if (!res.ok || !res.body) throw new Error("Failed to get a response");

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let full = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      full += decoder.decode(value, { stream: true });
      assistantEl.textContent = full;
      scrollToBottom();
    }
    await refreshSessions();
  } catch (err) {
    assistantEl.textContent = `Error: ${err.message}`;
  } finally {
    sendBtn.disabled = false;
  }
}

sendBtn.addEventListener("click", sendMessage);
messageInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// --- Boot ---

if (state.accessToken) {
  state.user = { email: "" };
  enterApp();
}
</script>
</body>
</html>
