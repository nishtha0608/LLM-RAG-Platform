name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=ghcr.io/${{ github.repository }}:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Set image and apply via kustomize
        run: |
          cd k8s/overlays/prod
          kustomize edit set image rag-platform=${{ env.IMAGE_TAG }}
          kubectl apply -k .

      - name: Wait for rollout
        run: kubectl rollout status deployment/rag-api -n rag-prod --timeout=300s

      - name: Rollback on failure
        if: failure()
        run: kubectl rollout undo deployment/rag-api -n rag-prod
